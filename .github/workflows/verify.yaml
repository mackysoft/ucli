name: verify

env:
  DOTNET_SOLUTION: Ucli.slnx

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

permissions:
  contents: read

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest

    outputs:
      needs_dotnet: ${{ steps.detect.outputs.needs_dotnet }}
      needs_unity: ${{ steps.detect.outputs.needs_unity }}
      needs_shared_pack: ${{ steps.detect.outputs.needs_shared_pack }}
      needs_cli_pack: ${{ steps.detect.outputs.needs_cli_pack }}
      needs_unity_pack: ${{ steps.detect.outputs.needs_unity_pack }}
      dotnet_matrix_json: ${{ steps.detect.outputs.dotnet_matrix_json }}
      unity_matrix_json: ${{ steps.detect.outputs.unity_matrix_json }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed scopes
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: ./scripts/detect-verify-scopes.sh

  access_guard:
    name: access-guard
    needs: changes
    if: ${{ needs.changes.outputs.needs_unity == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate Unity workflow access
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            echo "Unity verification is allowed for ${EVENT_NAME}."
            exit 0
          fi

          if [[ "${HEAD_REPOSITORY}" != "${REPOSITORY}" ]]; then
            echo "Unity verification is restricted to branches in ${REPOSITORY}. Actual head repository: ${HEAD_REPOSITORY}" >&2
            exit 1
          fi

          case "${AUTHOR_ASSOCIATION}" in
            OWNER|MEMBER|COLLABORATOR)
              echo "Unity verification is allowed for author association ${AUTHOR_ASSOCIATION}."
              ;;
            *)
              echo "Unity verification requires OWNER, MEMBER, or COLLABORATOR. Actual author association: ${AUTHOR_ASSOCIATION}" >&2
              exit 1
              ;;
          esac

  dotnet:
    name: dotnet (${{ matrix.os_name }})
    needs: changes
    if: ${{ needs.changes.outputs.needs_dotnet == 'true' }}
    runs-on: ${{ matrix.runs_on }}

    strategy:
      fail-fast: true
      matrix: ${{ fromJSON(needs.changes.outputs.dotnet_matrix_json) }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Ucli.slnx', '**/*.csproj') }}

      - name: Restore
        run: dotnet restore "$DOTNET_SOLUTION"

      - name: Verify code
        run: >-
          bash scripts/verify.sh
          --no-restore
          --solution "$DOTNET_SOLUTION"
          --configuration Release
          --
          --logger "trx;LogFileName=${{ matrix.os_name }}.trx"
          --results-directory "artifacts/test-results/${{ matrix.os_name }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-test-results-${{ matrix.os_name }}
          path: artifacts/test-results/${{ matrix.os_name }}
          if-no-files-found: warn

  unity:
    name: unity (${{ matrix.os_name }})
    needs:
      - changes
      - access_guard
      - dotnet
    if: ${{ always() && needs.changes.outputs.needs_unity == 'true' && needs.access_guard.result == 'success' && (needs.changes.outputs.needs_dotnet != 'true' || needs.dotnet.result == 'success') }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 90

    strategy:
      fail-fast: true
      matrix: ${{ fromJSON(needs.changes.outputs.unity_matrix_json) }}

    env:
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Ucli.slnx', '**/*.csproj') }}

      - name: Setup NuGet CLI on Linux or macOS
        if: ${{ runner.os != 'Windows' }}
        run: ./scripts/setup-nuget-cli.sh
        shell: bash

      - name: Setup NuGet on Windows
        if: ${{ runner.os == 'Windows' }}
        run: |
          $nugetDir = Join-Path $env:RUNNER_TEMP 'nuget'
          New-Item -ItemType Directory -Force -Path $nugetDir | Out-Null
          Invoke-WebRequest `
            -Uri 'https://dist.nuget.org/win-x86-commandline/v7.3.0/nuget.exe' `
            -OutFile (Join-Path $nugetDir 'nuget.exe')
          Add-Content -Path $env:GITHUB_PATH -Value $nugetDir
        shell: pwsh

      - name: Setup Unity Editor
        id: unity_setup
        uses: buildalon/unity-setup@v2
        with:
          version-file: src/Ucli.Unity/ProjectSettings/ProjectVersion.txt
          cache-installation: ${{ matrix.cache_installation }}

      - name: Activate Unity license
        uses: buildalon/activate-unity-license@v2
        with:
          license: personal
          username: ${{ secrets.UNITY_EMAIL }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: src/Ucli.Unity/Library
          key: ${{ runner.os }}-unity-library-${{ hashFiles('src/Ucli.Unity/ProjectSettings/ProjectVersion.txt', 'src/Ucli.Unity/Packages/manifest.json', 'src/Ucli.Unity/Packages/packages-lock.json', 'src/Ucli.Unity/Assets/packages.config') }}
          restore-keys: |
            ${{ runner.os }}-unity-library-

      - name: Run Unity EditMode tests
        id: unity_test
        continue-on-error: true
        run: |
          bash scripts/test-unity.sh \
            --project-path "src/Ucli.Unity" \
            --unity-editor-path "${{ steps.unity_setup.outputs.unity-editor-path }}" \
            --assembly-name "MackySoft.Ucli.Unity.Tests.Editor" \
            --result-dir "artifacts/unity/${{ matrix.os_name }}"
        shell: bash

      - name: Upload Unity artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-test-results-${{ matrix.os_name }}
          include-hidden-files: true
          path: |
            artifacts/unity/${{ matrix.os_name }}
            .ucli
          if-no-files-found: warn

      - name: Validate Unity command result on Linux or macOS
        if: ${{ runner.os != 'Windows' && steps.unity_test.outputs.exit_code == '0' }}
        run: |
          set -euo pipefail

          json_path="${GITHUB_WORKSPACE}/artifacts/unity/${{ matrix.os_name }}/command-result.json"
          jq -e '
            .status == "ok"
            and .exitCode == 0
            and .payload.result == "pass"
          ' "${json_path}" > /dev/null
        shell: bash

      - name: Validate Unity command result on Windows
        if: ${{ runner.os == 'Windows' && steps.unity_test.outputs.exit_code == '0' }}
        run: |
          $jsonPath = Join-Path $env:GITHUB_WORKSPACE 'artifacts/unity/${{ matrix.os_name }}/command-result.json'
          $result = Get-Content -Path $jsonPath -Raw | ConvertFrom-Json

          if ($result.status -ne 'ok' -or $result.exitCode -ne 0 -or $result.payload.result -ne 'pass') {
            throw "Unity command result did not report pass."
          }
        shell: pwsh

      - name: Fail when Unity tests fail on Linux or macOS
        if: ${{ runner.os != 'Windows' && steps.unity_test.outputs.exit_code != '0' }}
        run: |
          echo "Unity EditMode tests failed with exit code ${{ steps.unity_test.outputs.exit_code }}." >&2
          exit 1
        shell: bash

      - name: Fail when Unity tests fail on Windows
        if: ${{ runner.os == 'Windows' && steps.unity_test.outputs.exit_code != '0' }}
        run: |
          Write-Error "Unity EditMode tests failed with exit code ${{ steps.unity_test.outputs.exit_code }}."
        shell: pwsh

  shared_pack:
    name: shared-pack
    needs: changes
    if: ${{ needs.changes.outputs.needs_shared_pack == 'true' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Ucli.slnx', '**/*.csproj') }}

      - name: Restore shared packages
        run: dotnet restore src/Ucli.Infrastructure/Ucli.Infrastructure.csproj

      - name: Build shared packages
        run: dotnet build src/Ucli.Infrastructure/Ucli.Infrastructure.csproj --configuration Release --no-restore

      - name: Pack shared packages
        run: |
          dotnet pack src/Ucli.Contracts/Ucli.Contracts.csproj --configuration Release --no-build --output artifacts/packages
          dotnet pack src/Ucli.Infrastructure/Ucli.Infrastructure.csproj --configuration Release --no-build --output artifacts/packages

      - name: Upload shared packages
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: shared-package-artifacts
          path: artifacts/packages
          if-no-files-found: warn

  cli_pack:
    name: cli-pack
    needs: changes
    if: ${{ needs.changes.outputs.needs_cli_pack == 'true' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Ucli.slnx', '**/*.csproj') }}

      - name: Restore CLI
        run: dotnet restore src/Ucli/Ucli.csproj

      - name: Pack CLI tool
        run: >-
          dotnet pack src/Ucli/Ucli.csproj
          --configuration Release
          --no-restore
          -p:Version=0.0.0-ci
          -p:PackageVersion=0.0.0-ci
          --output artifacts/packages

      - name: Smoke test CLI tool package
        run: ./scripts/verify-cli-package.sh artifacts/packages 0.0.0-ci

      - name: Upload CLI package
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cli-package-artifacts
          path: artifacts/packages
          if-no-files-found: warn

  unity_pack:
    name: unity-pack
    needs: changes
    if: ${{ needs.changes.outputs.needs_unity_pack == 'true' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup NuGet CLI
        run: ./scripts/setup-nuget-cli.sh

      - name: Pack Unity plugin
        run: ./scripts/pack-unity-plugin.sh --version 0.0.0-ci --output artifacts/packages

      - name: Verify Unity plugin package
        run: ./scripts/verify-unity-plugin-package.sh artifacts/packages 0.0.0-ci

      - name: Upload Unity plugin package
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-package-artifacts
          path: artifacts/packages
          if-no-files-found: warn

  required:
    name: required
    if: ${{ always() && !cancelled() }}
    needs:
      - changes
      - access_guard
      - dotnet
      - unity
      - shared_pack
      - cli_pack
      - unity_pack
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate required jobs
        shell: bash
        env:
          NEEDS_DOTNET: ${{ needs.changes.outputs.needs_dotnet }}
          NEEDS_UNITY: ${{ needs.changes.outputs.needs_unity }}
          NEEDS_SHARED_PACK: ${{ needs.changes.outputs.needs_shared_pack }}
          NEEDS_CLI_PACK: ${{ needs.changes.outputs.needs_cli_pack }}
          NEEDS_UNITY_PACK: ${{ needs.changes.outputs.needs_unity_pack }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          ACCESS_GUARD_RESULT: ${{ needs.access_guard.result }}
          DOTNET_RESULT: ${{ needs.dotnet.result }}
          UNITY_RESULT: ${{ needs.unity.result }}
          SHARED_PACK_RESULT: ${{ needs.shared_pack.result }}
          CLI_PACK_RESULT: ${{ needs.cli_pack.result }}
          UNITY_PACK_RESULT: ${{ needs.unity_pack.result }}
        run: |
          set -euo pipefail

          if [[ "${CHANGES_RESULT}" != "success" ]]; then
            echo "changes job did not succeed. Actual result: ${CHANGES_RESULT}" >&2
            exit 1
          fi

          if [[ "${NEEDS_DOTNET}" == "true" && "${DOTNET_RESULT}" != "success" ]]; then
            echo "dotnet job is required but finished with ${DOTNET_RESULT}." >&2
            exit 1
          fi

          if [[ "${NEEDS_UNITY}" == "true" ]]; then
            if [[ "${ACCESS_GUARD_RESULT}" != "success" ]]; then
              echo "access-guard is required for Unity verification but finished with ${ACCESS_GUARD_RESULT}." >&2
              exit 1
            fi

            if [[ "${UNITY_RESULT}" != "success" ]]; then
              echo "unity job is required but finished with ${UNITY_RESULT}." >&2
              exit 1
            fi
          fi

          if [[ "${NEEDS_SHARED_PACK}" == "true" && "${SHARED_PACK_RESULT}" != "success" ]]; then
            echo "shared-pack job is required but finished with ${SHARED_PACK_RESULT}." >&2
            exit 1
          fi

          if [[ "${NEEDS_CLI_PACK}" == "true" && "${CLI_PACK_RESULT}" != "success" ]]; then
            echo "cli-pack job is required but finished with ${CLI_PACK_RESULT}." >&2
            exit 1
          fi

          if [[ "${NEEDS_UNITY_PACK}" == "true" && "${UNITY_PACK_RESULT}" != "success" ]]; then
            echo "unity-pack job is required but finished with ${UNITY_PACK_RESULT}." >&2
            exit 1
          fi

          echo "All required verification jobs completed successfully."
