name: verify

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest

    outputs:
      needs_dotnet: ${{ steps.detect.outputs.needs_dotnet }}
      needs_unity: ${{ steps.detect.outputs.needs_unity }}
      needs_contracts_pack: ${{ steps.detect.outputs.needs_contracts_pack }}

    steps:
      - name: Detect changed scopes
        id: detect
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" || "${EVENT_NAME}" == "merge_group" ]]; then
            echo "needs_dotnet=true" >> "${GITHUB_OUTPUT}"
            echo "needs_unity=true" >> "${GITHUB_OUTPUT}"
            echo "needs_contracts_pack=true" >> "${GITHUB_OUTPUT}"
            echo "Full verification requested for ${EVENT_NAME}."
            exit 0
          fi

          base_sha=""
          head_sha=""
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${PR_BASE_SHA}"
            head_sha="${PR_HEAD_SHA}"
          elif [[ "${EVENT_NAME}" == "push" ]]; then
            base_sha="${PUSH_BEFORE_SHA}"
            head_sha="${CURRENT_SHA}"
            if [[ -z "${base_sha}" || "${base_sha}" =~ ^0+$ ]]; then
              echo "needs_dotnet=true" >> "${GITHUB_OUTPUT}"
              echo "needs_unity=true" >> "${GITHUB_OUTPUT}"
              echo "needs_contracts_pack=true" >> "${GITHUB_OUTPUT}"
              echo "Initial push detected. Full verification required."
              exit 0
            fi
          else
            echo "needs_dotnet=true" >> "${GITHUB_OUTPUT}"
            echo "needs_unity=true" >> "${GITHUB_OUTPUT}"
            echo "needs_contracts_pack=true" >> "${GITHUB_OUTPUT}"
            echo "Unsupported event '${EVENT_NAME}' fell back to full verification."
            exit 0
          fi

          changed_files="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPOSITORY}/compare/${base_sha}...${head_sha}" \
              --jq '.files[].filename'
          )"

          needs_dotnet=false
          needs_unity=false
          needs_contracts_pack=false

          while IFS= read -r file; do
            [[ -z "${file}" ]] && continue

            case "${file}" in
              src/Ucli/*|src/Ucli.Contracts/*|tests/*|Ucli.slnx|.editorconfig|.github/workflows/verify.yaml)
                needs_dotnet=true
                ;;
            esac

            case "${file}" in
              src/Ucli.Unity/*|src/Ucli.Contracts/*|scripts/update-local-contracts-package.sh|.github/workflows/verify.yaml)
                needs_unity=true
                ;;
            esac

            case "${file}" in
              src/Ucli.Contracts/*|.github/workflows/verify.yaml)
                needs_contracts_pack=true
                ;;
            esac
          done <<< "${changed_files}"

          echo "Changed files:"
          if [[ -n "${changed_files}" ]]; then
            printf '%s\n' "${changed_files}"
          else
            echo "(none)"
          fi

          echo "needs_dotnet=${needs_dotnet}" >> "${GITHUB_OUTPUT}"
          echo "needs_unity=${needs_unity}" >> "${GITHUB_OUTPUT}"
          echo "needs_contracts_pack=${needs_contracts_pack}" >> "${GITHUB_OUTPUT}"

  access_guard:
    name: access-guard
    needs: changes
    if: ${{ needs.changes.outputs.needs_unity == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate Unity workflow access
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            echo "Unity verification is allowed for ${EVENT_NAME}."
            exit 0
          fi

          if [[ "${HEAD_REPOSITORY}" != "${REPOSITORY}" ]]; then
            echo "Unity verification is restricted to branches in ${REPOSITORY}. Actual head repository: ${HEAD_REPOSITORY}" >&2
            exit 1
          fi

          case "${AUTHOR_ASSOCIATION}" in
            OWNER|MEMBER|COLLABORATOR)
              echo "Unity verification is allowed for author association ${AUTHOR_ASSOCIATION}."
              ;;
            *)
              echo "Unity verification requires OWNER, MEMBER, or COLLABORATOR. Actual author association: ${AUTHOR_ASSOCIATION}" >&2
              exit 1
              ;;
          esac

  dotnet:
    name: dotnet (${{ matrix.os_name }})
    needs: changes
    if: ${{ needs.changes.outputs.needs_dotnet == 'true' }}
    runs-on: ${{ matrix.runs_on }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            os_name: linux
          - runs_on: windows-latest
            os_name: windows

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Ucli.slnx', '**/*.csproj') }}

      - name: Restore
        run: dotnet restore Ucli.slnx

      - name: Build
        run: dotnet build Ucli.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Ucli.slnx --configuration Release --no-build --logger "trx;LogFileName=${{ matrix.os_name }}.trx" --results-directory artifacts/test-results/${{ matrix.os_name }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results-${{ matrix.os_name }}
          path: artifacts/test-results/${{ matrix.os_name }}
          if-no-files-found: warn

  unity:
    name: unity (${{ matrix.os_name }})
    needs:
      - changes
      - access_guard
    if: ${{ needs.changes.outputs.needs_unity == 'true' && needs.access_guard.result == 'success' }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            os_name: linux
          - runs_on: windows-latest
            os_name: windows
          - runs_on: macos-latest
            os_name: macos

    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Mono
        if: ${{ runner.os == 'Linux' }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes mono-complete

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Ucli.slnx', '**/*.csproj') }}

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: src/Ucli.Unity/Library
          key: ${{ runner.os }}-unity-library-${{ hashFiles('src/Ucli.Unity/ProjectSettings/ProjectVersion.txt', 'src/Ucli.Unity/Packages/manifest.json', 'src/Ucli.Unity/Packages/packages-lock.json', 'src/Ucli.Unity/Assets/packages.config') }}
          restore-keys: |
            ${{ runner.os }}-unity-library-

      - name: Restore Unity dependencies
        run: ./scripts/update-local-contracts-package.sh --prune

      - name: Run Unity EditMode tests
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: src/Ucli.Unity
          unityVersion: auto
          testMode: EditMode
          artifactsPath: artifacts/unity/${{ matrix.os_name }}

      - name: Upload Unity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results-${{ matrix.os_name }}
          path: artifacts/unity/${{ matrix.os_name }}
          if-no-files-found: warn

  contracts_pack:
    name: contracts-pack
    needs: changes
    if: ${{ needs.changes.outputs.needs_contracts_pack == 'true' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Ucli.slnx', '**/*.csproj') }}

      - name: Restore contracts
        run: dotnet restore src/Ucli.Contracts/Ucli.Contracts.csproj

      - name: Build contracts
        run: dotnet build src/Ucli.Contracts/Ucli.Contracts.csproj --configuration Release --no-restore

      - name: Pack contracts
        run: dotnet pack src/Ucli.Contracts/Ucli.Contracts.csproj --configuration Release --no-build --output artifacts/packages

      - name: Upload contracts package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contracts-package-artifacts
          path: artifacts/packages
          if-no-files-found: warn

  required:
    name: required
    if: ${{ always() }}
    needs:
      - changes
      - access_guard
      - dotnet
      - unity
      - contracts_pack
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate required jobs
        shell: bash
        env:
          NEEDS_DOTNET: ${{ needs.changes.outputs.needs_dotnet }}
          NEEDS_UNITY: ${{ needs.changes.outputs.needs_unity }}
          NEEDS_CONTRACTS_PACK: ${{ needs.changes.outputs.needs_contracts_pack }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          ACCESS_GUARD_RESULT: ${{ needs.access_guard.result }}
          DOTNET_RESULT: ${{ needs.dotnet.result }}
          UNITY_RESULT: ${{ needs.unity.result }}
          CONTRACTS_PACK_RESULT: ${{ needs.contracts_pack.result }}
        run: |
          set -euo pipefail

          if [[ "${CHANGES_RESULT}" != "success" ]]; then
            echo "changes job did not succeed. Actual result: ${CHANGES_RESULT}" >&2
            exit 1
          fi

          if [[ "${NEEDS_DOTNET}" == "true" && "${DOTNET_RESULT}" != "success" ]]; then
            echo "dotnet job is required but finished with ${DOTNET_RESULT}." >&2
            exit 1
          fi

          if [[ "${NEEDS_UNITY}" == "true" ]]; then
            if [[ "${ACCESS_GUARD_RESULT}" != "success" ]]; then
              echo "access-guard is required for Unity verification but finished with ${ACCESS_GUARD_RESULT}." >&2
              exit 1
            fi

            if [[ "${UNITY_RESULT}" != "success" ]]; then
              echo "unity job is required but finished with ${UNITY_RESULT}." >&2
              exit 1
            fi
          fi

          if [[ "${NEEDS_CONTRACTS_PACK}" == "true" && "${CONTRACTS_PACK_RESULT}" != "success" ]]; then
            echo "contracts-pack job is required but finished with ${CONTRACTS_PACK_RESULT}." >&2
            exit 1
          fi

          echo "All required verification jobs completed successfully."
