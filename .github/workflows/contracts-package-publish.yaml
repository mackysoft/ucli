name: contracts-package-publish

on:
  push:
    tags:
      - contracts/*
  workflow_dispatch:
    inputs:
      package_version:
        description: "SemVer package version (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve package version
        id: version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.package_version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            package_version="${DISPATCH_VERSION}"
          else
            tag_name="${GITHUB_REF_NAME}"
            package_version="${tag_name#contracts/}"
          fi

          if [[ ! "${package_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Package version must use <major>.<minor>.<patch> format. Actual: ${package_version}" >&2
            exit 1
          fi

          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"

      - name: Pack contracts
        run: >-
          dotnet pack src/Ucli.Contracts/Ucli.Contracts.csproj
          --configuration Release
          -p:PackageVersion=${{ steps.version.outputs.package_version }}
          --output artifacts/packages

      - name: Publish to GitHub Packages
        run: >-
          dotnet nuget push "artifacts/packages/*.nupkg"
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --skip-duplicate

      - name: Sync contracts csproj version
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

          csproj_path="src/Ucli.Contracts/Ucli.Contracts.csproj"
          current_version="$(sed -n 's#.*<Version>\(.*\)</Version>.*#\1#p' "${csproj_path}" | head -n 1)"
          if [[ "${current_version}" == "${PACKAGE_VERSION}" ]]; then
            echo "No csproj version update required."
            exit 0
          fi

          sed -i -E "0,/<Version>[^<]+<\/Version>/s//<Version>${PACKAGE_VERSION}<\/Version>/" "${csproj_path}"

          git add "${csproj_path}"
          git commit -m "chore(contracts): sync package version to ${PACKAGE_VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
