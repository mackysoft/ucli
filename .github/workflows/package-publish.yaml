name: package-publish

env:
  NUGET_PACKAGES: ${{ github.workspace }}/src/Ucli.Unity/.nuget-packages

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag without prefix (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_sha: ${{ steps.source.outputs.release_sha }}

    steps:
      - name: Validate workflow dispatch source
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "${REF_NAME}" != "${DEFAULT_BRANCH}" ]]; then
            echo "workflow_dispatch releases must run from ${DEFAULT_BRANCH}. Actual ref: ${REF_NAME}" >&2
            exit 1
          fi

      - name: Checkout release tooling
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve package version
        id: version
        shell: bash
        env:
          DISPATCH_TAG: ${{ github.event.inputs.release_tag }}
        run: ./scripts/resolve-release-version.sh --dispatch-tag "${DISPATCH_TAG}"

      - name: Validate release source
        id: source
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_SHA: ${{ github.sha }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          set -euo pipefail

          git fetch origin "${DEFAULT_BRANCH}"

          release_sha="${RELEASE_SHA}"
          if [[ "${EVENT_NAME}" != "workflow_dispatch" ]]; then
            git fetch --force origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
            release_sha="$(git rev-list -n 1 "refs/tags/${TAG_NAME}")"
          fi

          if ! git merge-base --is-ancestor "${release_sha}" "origin/${DEFAULT_BRANCH}"; then
            echo "Release source must be reachable from origin/${DEFAULT_BRANCH}. Actual sha: ${release_sha}" >&2
            exit 1
          fi

          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"

      - name: Create and push release tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          RELEASE_SHA: ${{ steps.source.outputs.release_sha }}
        run: ./scripts/create-release-tag.sh --tag-name "${TAG_NAME}" --release-sha "${RELEASE_SHA}"

  publish:
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Pack from the validated commit so a moved tag cannot change the
          # source after prepare-release has accepted it.
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Guard checked out release source
        uses: mackysoft/actions/release/source-guard@v1
        with:
          tag-name: ${{ needs.prepare-release.outputs.tag_name }}
          default-branch: ${{ github.event.repository.default_branch }}
          expected-release-sha: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup NuGet CLI
        run: ./scripts/setup-nuget-cli.sh

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: src/Ucli.Unity/.nuget-packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Ucli.slnx', '**/*.csproj') }}

      - name: Sync release package versions
        run: ./scripts/sync-package-version.sh --version "${{ needs.prepare-release.outputs.package_version }}"

      - name: Restore
        run: dotnet restore Ucli.slnx

      - name: Verify generated skills
        run: bash scripts/verify-skills.sh

      - name: Pack shared packages
        run: |
          dotnet pack src/Ucli.Contracts/Ucli.Contracts.csproj \
            --configuration Release \
            --no-restore \
            -p:Version=${{ needs.prepare-release.outputs.package_version }} \
            -p:PackageVersion=${{ needs.prepare-release.outputs.package_version }} \
            --output artifacts/packages
          dotnet pack src/Ucli.Infrastructure/Ucli.Infrastructure.csproj \
            --configuration Release \
            --no-restore \
            -p:Version=${{ needs.prepare-release.outputs.package_version }} \
            -p:PackageVersion=${{ needs.prepare-release.outputs.package_version }} \
            --output artifacts/packages

      - name: Pack CLI tool
        run: >-
          dotnet pack src/Ucli/Ucli.csproj
          --configuration Release
          --no-restore
          -p:Version=${{ needs.prepare-release.outputs.package_version }}
          -p:PackageVersion=${{ needs.prepare-release.outputs.package_version }}
          --output artifacts/packages

      - name: Pack schema artifacts
        run: ./scripts/pack-schema-artifacts.sh --version "${{ needs.prepare-release.outputs.package_version }}" --output artifacts/packages

      - name: Pack Unity plugin
        run: ./scripts/pack-unity-plugin.sh --version "${{ needs.prepare-release.outputs.package_version }}" --output artifacts/packages

      - name: Verify shared packages
        run: ./scripts/verify-shared-packages.sh artifacts/packages "${{ needs.prepare-release.outputs.package_version }}"

      - name: Smoke test CLI tool package
        run: ./scripts/verify-cli-package.sh artifacts/packages "${{ needs.prepare-release.outputs.package_version }}"

      - name: Verify schema artifacts
        run: ./scripts/verify-schema-artifacts.sh artifacts/packages "${{ needs.prepare-release.outputs.package_version }}"

      - name: Verify Unity plugin package
        run: ./scripts/verify-unity-plugin-package.sh artifacts/packages "${{ needs.prepare-release.outputs.package_version }}"

      - name: Verify release artifact set
        run: ./scripts/verify-release-package-artifacts.sh artifacts/packages "${{ needs.prepare-release.outputs.package_version }}"

      - name: Inspect NuGet publication state
        id: nuget_state
        uses: mackysoft/actions/nuget/package-state@v1
        with:
          mode: inspect
          package-version: ${{ needs.prepare-release.outputs.package_version }}
          package-ids: |
            MackySoft.Ucli
            MackySoft.Ucli.Contracts
            MackySoft.Ucli.Infrastructure
            MackySoft.Ucli.Unity

      - name: Validate NuGet trusted publishing user
        if: ${{ steps.nuget_state.outputs['publish-required'] == 'true' }}
        env:
          NUGET_USER: ${{ vars.NUGET_USER }}
        run: |
          set -euo pipefail

          if [[ -z "${NUGET_USER}" ]]; then
            echo "Repository variable NUGET_USER must be set to the nuget.org profile name." >&2
            exit 2
          fi

      - name: Publish to nuget.org
        if: ${{ steps.nuget_state.outputs['publish-required'] == 'true' }}
        uses: mackysoft/actions/nuget/trusted-publish@v1
        with:
          package-glob: artifacts/packages/*.nupkg
          nuget-user: ${{ vars.NUGET_USER }}

      - name: Wait for published NuGet packages
        uses: mackysoft/actions/nuget/package-state@v1
        with:
          mode: wait
          package-version: ${{ needs.prepare-release.outputs.package_version }}
          package-ids: |
            MackySoft.Ucli
            MackySoft.Ucli.Contracts
            MackySoft.Ucli.Infrastructure
            MackySoft.Ucli.Unity
          max-attempts: 90
          interval-seconds: 10

      - name: Mirror packages to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ needs.prepare-release.outputs.package_version }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: >-
          ./scripts/mirror-nuget-package-release.sh
          --repository "${REPOSITORY}"
          --tag-name "${RELEASE_TAG}"
          --package-glob "artifacts/packages/*.nupkg"
          --title "${PACKAGE_VERSION}"
          --notes ""

      - name: Mirror schema artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
          SCHEMA_ARCHIVE: artifacts/packages/MackySoft.Ucli.Schemas.${{ needs.prepare-release.outputs.package_version }}.zip
        run: gh release upload "${RELEASE_TAG}" "${SCHEMA_ARCHIVE}" --repo "${REPOSITORY}" --clobber
