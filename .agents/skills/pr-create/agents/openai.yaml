interface:
  display_name: "PR Create"
  short_description: "PR作成依頼を受けたときに、検証・`$push`・PR作成までを一気通貫で実行する。Issueがある場合はIssueを優先して本文とbaseを決定し、Issueが特定できない場合は確認なしでIssueなし運用として継続する。既存Open PRがある場合は更新か新規作成を確認する。"
  default_prompt: "Use $pr-create to follow the PR Create workflow."

policy:
  allow_implicit_invocation: true
