interface:
  display_name: "Ultra Review"
  short_description: "サブエージェントを複数起動して、変更差分または指定範囲を複数観点で反復レビューし、所見の妥当性評価、有効な所見の修正、再レビュー、検証まで行う。深いコードレビュー、修正込みレビュー、脆弱性レビュー、凝集性レビュー、責務境界レビュー、ディレクトリ責務境界レビュー、修正可能な採用所見がなくなるまでの改善、または ultra-review が求められたときに使う。明示的なレビュー専用または編集禁止の指定がない通常のレビュー依頼では、安全に修正できる採用所見を修正する。"
  default_prompt: "Use $ultra-review to follow the Ultra Review workflow."

policy:
  allow_implicit_invocation: true
