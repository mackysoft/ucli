interface:
  display_name: "Review Triage"
  short_description: "貼り付けられた、サブエージェントから返された、または自動レビューで生成されたコードレビュー・設計レビュー指摘を対象コード・仕様・関連資料と照合し、差分がある場合はその文脈も含めて各指摘の正当性を判定して `採用 / 却下 / 保留 / 要確認` にトリアージし、採用項目を束ねた改善設計と次工程を整理する。レビュー返信作成や実装変更そのものが主目的のときは使わない。"
  default_prompt: "Use $review-triage to follow the Review Triage workflow."

policy:
  allow_implicit_invocation: true
