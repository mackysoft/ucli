interface:
  display_name: "Review Triage"
  short_description: "貼り付けられた、サブエージェントから返された、または自動レビューで生成されたコードレビュー・設計レビュー所見を対象コード・仕様・関連資料と照合し、各所見の正当性を `採用 / 却下 / 保留 / 要確認` にトリアージし、採用所見を対応方針へ束ねる。レビュー返信作成や実装変更そのものが主目的のときは使わない。"
  default_prompt: "Use $review-triage to follow the Review Triage workflow."

policy:
  allow_implicit_invocation: true
